APP:
  NAME: "Math Tutor"
  ENV: "local"
  BASE_URL: "http://localhost:8000"
  FRONTEND_URL: "http://localhost:3000"
  STORAGE_DIR: "/data"
  DEV_AUTH_BYPASS: "${DEV_AUTH_BYPASS}"

AUTH:
  JWT_SECRET: "${JWT_SECRET}"
  GOOGLE:
    CLIENT_ID: "${GOOGLE_CLIENT_ID}"
    CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
    REDIRECT_URI: "http://localhost:8000/api/auth/google/callback"
    SCOPES:
      - "openid"
      - "email"
      - "profile"

LLM:
  PROVIDER: "openai_compatible"
  BASE_URL: "${LLM_BASE_URL}"
  API_KEY: "${LLM_API_KEY}"
  MODEL: "mistral-small-latest"
  TEMPERATURE: 0.3
  MAX_TOKENS: 10000

CHAT:
  PROVIDER: "openai_compatible"
  BASE_URL: "${CHAT_BASE_URL}"
  API_KEY: "${CHAT_API_KEY}"
  MODEL: "mistral-small-latest"
  TEMPERATURE: 0.2
  MAX_TOKENS: 1500

VLM:
  PROVIDER: "openai_compatible"
  BASE_URL: "${VLM_BASE_URL}"
  API_KEY: "${VLM_API_KEY}"
  MODEL: "mistral-ocr-2512"
  TEMPERATURE: 0.2
  MAX_TOKENS: 2000
  ENABLED: "${VLM_ENABLED}"

TTS:
  PROVIDER: "elevenlabs"
  API_KEY: "${ELEVENLABS_API_KEY}"
  VOICE_ID: "${ELEVENLABS_VOICE_ID}"
  MODEL_ID: "${ELEVENLABS_MODEL_ID}"
  OUTPUT_FORMAT: "mp3"

CAPTIONS:
  METHOD: "faster_whisper"
  WHISPER_MODEL: "small"

MANIM:
  MODEL: "magistral-medium-2509"
  QUALITY: "medium"
  SCENE_CLASS_NAME: "LessonScene"
  RENDER_BACKEND: "${MANIM_RENDER_BACKEND}"
  MCP_COMMAND: "${MANIM_MCP_COMMAND}"
  MCP_ARGS: "${MANIM_MCP_ARGS}"
  MCP_MEDIA_DIR: "${MANIM_MCP_MEDIA_DIR}"
  MCP_TIMEOUT_SECONDS: "${MANIM_MCP_TIMEOUT_SECONDS}"

DATABASE:
  URL: "${DATABASE_URL}"

REDIS:
  URL: "${REDIS_URL}"
